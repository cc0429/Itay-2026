/* ── MAP ── */
const map = L.map('map',{zoomControl:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:19
}).addTo(map);

let layers=[], markers=[], curDay=0;

/* ── TABS ── */
const tabsEl=document.getElementById('tabs');
DAYS.forEach((d,i)=>{
  const t=document.createElement('div');
  t.className='tab';
  t.innerHTML=`${d.emoji} ${d.date}`;
  t.onclick=()=>selectDay(i);
  tabsEl.appendChild(t);
});

/* ── SELECT DAY ── */
function selectDay(i){
  curDay=i; const day=DAYS[i];
  // tabs
  document.querySelectorAll('.tab').forEach((t,j)=>{
    t.className='tab'+(j===i?' active':'');
    t.style.cssText=j===i?`background:${DAYS[j].color};border-color:${DAYS[j].color};color:#fff`:'';
  });
  // clear map
  layers.forEach(l=>map.removeLayer(l)); layers=[]; markers=[];
  // route line
  const coords=day.stops.map(s=>[s.lat,s.lon]);
  if(coords.length>1){
    const ln=L.polyline(coords,{color:day.color,weight:4,opacity:.85}).addTo(map);
    layers.push(ln);
  }
  // markers
  day.stops.forEach((s,idx)=>{
    const icon=L.divIcon({
      html:`<div style="width:28px;height:28px;border-radius:50%;background:${day.color};
        border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);
        display:flex;align-items:center;justify-content:center;
        font-size:11px;font-weight:800;color:#fff;">${idx+1}</div>`,
      className:'',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-14]
    });
    const mk=L.marker([s.lat,s.lon],{icon}).addTo(map)
      .bindPopup(`<div class="pt">${s.t}</div><div class="pn">${s.n}</div><div class="pd">${s.desc}</div>`,
        {maxWidth:230});
    mk.on('click',()=>hlStop(idx));
    layers.push(mk); markers.push(mk);
  });
  // fit bounds
  if(coords.length===1) map.setView(coords[0],day.zoom||14);
  else if(coords.length>1) map.fitBounds(L.latLngBounds(coords).pad(.18));
  // sidebar
  renderSB(day,i);
}

/* ── SIDEBAR ── */
function renderSB(day,di){
  const stops=day.stops;
  // Google Maps URL
  let gurl='';
  if(stops.length>=2){
    const o=`${stops[0].lat},${stops[0].lon}`;
    const d=`${stops[stops.length-1].lat},${stops[stops.length-1].lon}`;
    const wp=stops.slice(1,-1).slice(0,8).map(s=>`${s.lat},${s.lon}`).join('|');
    gurl=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}${wp?'&waypoints='+wp:''}`;
  }
  // group by section
  const secs={};
  stops.forEach((s,i)=>{
    const k=s.sec||'All Day';
    if(!secs[k])secs[k]=[];
    secs[k].push({...s,idx:i});
  });
  const order=['Morning','Afternoon','Evening','All Day'];
  const labels={Morning:'🌅 上午',Afternoon:'☀️ 下午',Evening:'🌙 晚上','All Day':'📍 全天'};

  let html=`<div class="dh">
    <div class="dlabel">DAY ${di+1} &nbsp;·&nbsp; ${day.date} ${day.dow}</div>
    <div class="dtitle">${day.emoji} ${day.title}</div>
    <div class="ddesc">${day.desc}</div>
    ${gurl?`<a class="rbtn" href="${gurl}" target="_blank">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      在 Google Maps 中打开路线
    </a>`:``}
  </div>`;

  order.forEach(sec=>{
    if(!secs[sec])return;
    html+=`<div class="slabel">${labels[sec]||sec}</div>`;
    secs[sec].forEach(s=>{
      const stars='★'.repeat(Math.round(s.rating))+'☆'.repeat(5-Math.round(s.rating));
      html+=`<div class="sc" id="sc${s.idx}" onclick="hlStop(${s.idx})">
        <div class="sthumb" style="background:${day.color}">${s.idx+1}</div>
        <div class="sright">
          <div class="stime">${s.t}</div>
          <div class="sname" title="${s.n}">${s.n}</div>
          <div class="smeta"><span class="sstar">${s.rating}</span> ★ (${s.reviews}) · ${s.cat}</div>
          <div class="sdesc">${s.desc}</div>
          ${s.next?`<div class="snext">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="#1a73e8"><path d="M8 5v14l11-7z"/></svg>
            ${s.next}
          </div>`:''}
        </div>
      </div>`;
    });
  });

  document.getElementById('sb').innerHTML=html;
}

/* ── HIGHLIGHT STOP ── */
function hlStop(idx){
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('hl'));
  const card=document.getElementById('sc'+idx);
  if(card){card.classList.add('hl');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  if(markers[idx]){
    const s=DAYS[curDay].stops[idx];
    map.panTo([s.lat,s.lon]);
    markers[idx].openPopup();
  }
}

/* ── KEYBOARD NAV ── */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&curDay<DAYS.length-1)selectDay(curDay+1);
  if(e.key==='ArrowLeft'&&curDay>0)selectDay(curDay-1);
});

selectDay(0);
</script>

    navigator.serviceWorker.register('./service-worker.js').catch(function(err){
      console.log('Service worker registration failed:', err);
    });
  });
}
</script>
